name: dipl
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  flutter_svg: ^2.0.10
  flutter_riverpod: ^2.6.1
  go_router: ^17.1.0
  dio: ^5.9.0
  get_it: ^8.2.0
  talker_flutter: ^5.0.0
  connectivity_plus: ^7.0.0
  flutter_secure_storage: ^9.2.4
  equatable: ^2.0.7
  dartz: ^0.10.1
  shared_preferences: ^2.3.1
  speech_to_text: ^7.4.0
  just_audio: ^0.10.5
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/enesai_icon_1024_4.png"

flutter:
